<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CLAUGER - Sistema de Informes Técnicos</title>
    <meta name="theme-color" content="#1a2744">
    <link rel="manifest" href="manifest.json">
    
    <!-- ============================================ -->
    <!-- CSS - RUTAS CORREGIDAS A /styles/            -->
    <!-- ============================================ -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/login.css">
    <link rel="stylesheet" href="styles/forms.css">
    <link rel="stylesheet" href="styles/equipment.css">
    <link rel="stylesheet" href="styles/checklist.css">
    <link rel="stylesheet" href="styles/photos.css">
</head>
<body>
    <!-- ============================================ -->
    <!-- OVERLAY: GIRAR DISPOSITIVO                   -->
    <!-- ============================================ -->
    <div id="rotateOverlay" style="display:none;position:fixed;inset:0;z-index:999999;background:#1a2744;color:#fff;flex-direction:column;align-items:center;justify-content:center;font-family:sans-serif;text-align:center;padding:2rem">
        <div style="font-size:4rem;margin-bottom:1rem">🔄</div>
        <div style="font-size:1.4rem;font-weight:700;margin-bottom:0.5rem">Gira el dispositivo</div>
        <div style="font-size:1rem;opacity:0.75">Esta aplicación requiere modo horizontal</div>
    </div>

    <!-- ============================================ -->
    <!-- LOGIN SCREEN                                  -->
    <!-- ============================================ -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-container">
            <div class="login-title">📋 CLAUGER</div>
            <div class="login-subtitle">Sistema de Informes Técnicos</div>
            
            <!-- Opciones de Login -->
            <div id="loginOptions" class="login-buttons">
                <button class="login-btn login-btn-primary" id="btnLoginTecnico">
                    🔧 Acceso Técnicos
                </button>
                <button class="login-btn login-btn-secondary" id="btnShowPassword">
                    ⚖️ Departamento Legal
                </button>
            </div>
            
            <!-- Formulario de Contraseña (Legal) -->
            <div id="passwordForm" class="password-container">
                <input type="password" id="passwordInput" class="password-input" placeholder="Introduce la contraseña" />
                <button class="login-btn login-btn-secondary" id="btnLoginLegal">
                    🔓 Acceder
                </button>
                <div id="passwordError" class="password-error">❌ Contraseña incorrecta</div>
                <button class="back-btn" id="btnBackToOptions">← Volver</button>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- MAIN APP                                      -->
    <!-- ============================================ -->
    <div id="app" class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="header-left">
                    <span class="header-icon">📋</span>
                    <div>
                        <div class="header-title">CLAUGER</div>
                        <div class="header-mode" id="modeIndicator">Sistema de Informes Técnicos</div>
                    </div>
                </div>
                <div class="header-buttons">
                    <div id="legalBadge" style="display:none" class="legal-badge">⚖️ MODO LEGAL</div>
                    <button class="header-btn" id="btnInformeFinal" style="display:none;background:#1a2744;color:#fff;font-weight:700;border-color:#1a2744">📄 Informe Final</button>
                    <button class="header-btn" id="btnActaInicial" style="display:none">📄 Acta Inicial</button>
                    <span id="autosaveBadge" style="font-size:0.72rem;color:#6b7280;opacity:0.4;transition:opacity 0.5s;margin-right:0.25rem;white-space:nowrap"></span>
                    <button class="header-btn" id="btnLoad">📂 Cargar</button>
                    <button class="header-btn" id="btnExport">💾 Exportar</button>
                    <button class="header-btn" id="btnLogout">🚪 Cerrar Sesión</button>
                </div>
            </div>
        </header>
        <!-- Tabs Navigation -->
        <nav class="tabs-navigation">
            <button class="nav-tab active" data-page="datos">📄 Datos</button>
            <button class="nav-tab" data-page="checklist">✅ Checklist</button>
            <button class="nav-tab" data-page="equipos">⚙️ Equipos</button>
            <button class="nav-tab" data-page="servicios">❄️ Servicios</button>
            <button class="nav-tab" data-page="verif_fugas">🔍 Verificación Detector Fugas</button>
            <button class="nav-tab" data-page="termografia" data-legal-only="true">🌡️ Termografía</button>
            <button class="nav-tab" data-page="revision_final" data-legal-only="true">📋 Revisión Final</button>
        </nav>

        <!-- Main Container -->
        <div class="main-container">
            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar"></aside>

            <!-- Workspace (Aquí se genera el contenido dinámicamente con JavaScript) -->
            <main class="workspace" id="workspace">
                <div class="empty-workspace">
                    <div>
                        <div class="empty-icon">⚙️</div>
                        <div style="font-size:1.25rem;font-weight:bold;margin-bottom:0.5rem">Selecciona una sección</div>
                        <p>Usa el menú lateral para comenzar</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- BANNER ACTUALIZACIÓN                          -->
    <!-- ============================================ -->
    <div id="updateBanner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:99999;background:#16a34a;color:#fff;text-align:center;padding:0.75rem 1rem;font-size:1rem;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,0.3)">
        ✅ Actualización aplicada — Versión <span id="updateVersion"></span>
        <button onclick="document.getElementById('updateBanner').style.display='none'" style="margin-left:1.5rem;background:rgba(255,255,255,0.25);border:none;color:#fff;font-size:1rem;padding:0.2rem 0.75rem;border-radius:4px;cursor:pointer">×</button>
    </div>

    <!-- ============================================ -->
    <!-- IMAGE MODAL                                   -->
    <!-- ============================================ -->
    <div id="imageModal" class="image-modal">
        <button class="image-modal-close" id="closeModal">×</button>
        <img id="modalImage" class="image-modal-content" src="" alt="Vista ampliada">
    </div>

    <!-- ============================================ -->
    <!-- JAVASCRIPT - ORDEN CORRECTO                  -->
    <!-- ============================================ -->
    <script async src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="scripts/config.js"></script>
    <script src="scripts/state.js"></script>
    <script src="scripts/utils.js"></script>
    <script src="scripts/auth.js"></script>
    <script src="scripts/app.js"></script>

    <!-- ============================================ -->
    <!-- SISTEMA DE INICIALIZACIÓN Y NAVEGACIÓN      -->
    <!-- ============================================ -->
    <script>
        /**
         * ========================================
         * SISTEMA DE INICIALIZACIÓN
         * ========================================
         */
        
        /**
         * ========================================
         * INICIALIZACIÓN DEL SISTEMA
         * ========================================
         */
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Sistema CLAUGER iniciado');
            
            // ========================================
            // CONFIGURAR BOTONES DE LOGIN
            // ========================================
            
            document.getElementById('btnLoginTecnico').addEventListener('click', function() {
                console.log('🔧 Login Técnico');
                
                // ESTABLECER MODO TÉCNICO
                if (typeof AppState !== 'undefined') {
                    AppState.isLegalMode = false;
                }
                
                // Ocultar login, mostrar app
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('app').classList.add('show');
                document.getElementById('modeIndicator').textContent = 'Acceso Técnicos';
                
                // Ocultar elementos legales
                document.getElementById('legalBadge').style.display = 'none';
                document.getElementById('btnActaInicial').style.display = 'none';
                
                // Inicializar la aplicación con app.js
                if (typeof App !== 'undefined' && App.init) {
                    App.init();
                    // Restaurar sesión guardada si existe
                    const _snap = App._getAutosave();
                    if (_snap && !_snap.isLegalMode) {
                        const _d = new Date(_snap.ts);
                        const _when = _d.toLocaleDateString('es-ES') + ' a las ' + _d.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
                        if (confirm('📂 Sesión guardada encontrada\n\nFecha: ' + _when + '\n\n¿Restaurar la sesión anterior?\n\n(Cancelar para empezar sesión nueva)')) {
                            App._applyAutosave(_snap);
                        } else {
                            App._clearAutosave();
                        }
                    }
                    // Autoguardado cada 2 minutos + aviso si recarga accidental
                    setInterval(() => App._doAutosave(), 2 * 60 * 1000);
                    window.addEventListener('beforeunload', (e) => {
                        App._doAutosave();
                        if (!window._intentionalReload) { e.preventDefault(); e.returnValue = ''; }
                    });
                }

                console.log('✅ Modo Técnico activado - isLegalMode:', AppState.isLegalMode);
            });
            
            document.getElementById('btnShowPassword').addEventListener('click', function() {
                console.log('🔑 Mostrar formulario password');
                document.getElementById('loginOptions').style.display = 'none';
                document.getElementById('passwordForm').classList.add('show');
                document.getElementById('passwordInput').focus();
            });
            
            document.getElementById('btnLoginLegal').addEventListener('click', function() {
                console.log('⚖️ Login Legal');
                const password = document.getElementById('passwordInput').value;
                
                if (password === '1234') {
                    // ESTABLECER MODO LEGAL
                    if (typeof AppState !== 'undefined') {
                        AppState.isLegalMode = true;
                    }
                    
                    // Ocultar login, mostrar app
                    document.getElementById('loginOverlay').style.display = 'none';
                    document.getElementById('app').classList.add('show');
                    document.getElementById('modeIndicator').textContent = 'Departamento Legal';
                    
                    // Mostrar elementos legales
                    document.getElementById('legalBadge').style.display = 'block';
                    document.getElementById('btnActaInicial').style.display = 'block';
                    
                    // Inicializar la aplicación con app.js
                    if (typeof App !== 'undefined' && App.init) {
                        App.init();
                        // Restaurar sesión guardada si existe
                        const _snap = App._getAutosave();
                        if (_snap && _snap.isLegalMode) {
                            const _d = new Date(_snap.ts);
                            const _when = _d.toLocaleDateString('es-ES') + ' a las ' + _d.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
                            if (confirm('📂 Sesión guardada encontrada\n\nFecha: ' + _when + '\n\n¿Restaurar la sesión anterior?\n\n(Cancelar para empezar sesión nueva)')) {
                                App._applyAutosave(_snap);
                            } else {
                                App._clearAutosave();
                            }
                        }
                        // Autoguardado cada 2 minutos + aviso si recarga accidental
                        setInterval(() => App._doAutosave(), 2 * 60 * 1000);
                        window.addEventListener('beforeunload', (e) => {
                            App._doAutosave();
                            if (!window._intentionalReload) { e.preventDefault(); e.returnValue = ''; }
                        });
                    }

                    console.log('✅ Modo Legal activado - isLegalMode:', AppState.isLegalMode);
                } else {
                    console.log('❌ Contraseña incorrecta');
                    document.getElementById('passwordError').classList.add('show');
                    document.getElementById('passwordInput').value = '';
                    document.getElementById('passwordInput').focus();
                    
                    setTimeout(() => {
                        document.getElementById('passwordError').classList.remove('show');
                    }, 3000);
                }
            });
            
            document.getElementById('btnBackToOptions').addEventListener('click', function() {
                console.log('← Volver a opciones');
                document.getElementById('passwordForm').classList.remove('show');
                document.getElementById('loginOptions').style.display = 'flex';
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordError').classList.remove('show');
            });
            
            document.getElementById('btnLogout').addEventListener('click', function() {
                if (confirm('¿Cerrar sesión y volver al inicio?')) {
                    window._intentionalReload = true;
                    location.reload();
                }
            });
            
            // ========================================
            // CONFIGURAR NAVEGACIÓN DE TABS
            // ========================================
            
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    const page = this.dataset.page;
                    console.log(`📑 Navegando a: ${page}`);

                    // Autoguardar al cambiar de pestaña
                    if (typeof App !== 'undefined' && App._doAutosave) App._doAutosave();
                    
                    // Actualizar tab activa
                    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    
                    // Actualizar estado global
                    if (typeof AppState !== 'undefined') {
                        AppState.currentPage = page;
                        AppState.currentSection = null;
                        AppState.currentEquipmentType = null;
                        AppState.currentSubType = null;
                        AppState.currentDetector = null;
                        AppState.currentServicio = null;
                        AppState.currentTermografia = null;
                        AppState.currentRevisionFinalTab = null;
                    }
                    
                    // Renderizar usando app.js
                    if (typeof App !== 'undefined') {
                        App.renderSidebar();
                        App.renderWorkspace();
                    }
                });
            });
            
            // ========================================
            // CONFIGURAR CIERRE DE MODAL DE IMAGEN
            // ========================================
            
            document.getElementById('closeModal').addEventListener('click', function() {
                document.getElementById('imageModal').classList.remove('show');
            });
            
            document.getElementById('imageModal').addEventListener('click', function(e) {
                if (e.target.id === 'imageModal') {
                    this.classList.remove('show');
                }
            });
            
            console.log('✅ Event listeners configurados');

            // ========================================
            // ORIENTACIÓN HORIZONTAL
            // ========================================
            // Overlay de rotación desactivado — la PWA funciona en cualquier orientación
            document.getElementById('rotateOverlay').style.display = 'none';

            // Forzar pantalla completa al tocar (necesario en Android)
            function _requestFullscreen() {
                const el = document.documentElement;
                if (el.requestFullscreen) el.requestFullscreen();
                else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            }
            document.addEventListener('click', function _fsOnce() {
                _requestFullscreen();
                document.removeEventListener('click', _fsOnce);
            }, { once: true });
            // Intentar directamente sin gesto si el navegador lo permite
            setTimeout(_requestFullscreen, 500);

            // Intentar bloquear en landscape (funciona en fullscreen PWA)
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape-primary').catch(() => {});
            }

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(() => console.log('✅ Service Worker registrado'))
                    .catch(e => console.warn('⚠️ Service Worker:', e));

                // Detectar actualización por mensaje del SW
                navigator.serviceWorker.addEventListener('message', e => {
                    if (e.data && e.data.type === 'APP_UPDATED') {
                        _showUpdateBanner(e.data.version);
                    }
                });
            }

            // Detectar actualización por cambio de versión en localStorage (fallback)
            const _storedVer = localStorage.getItem('clauger_app_version');
            const _currentVer = (typeof CONFIG !== 'undefined') ? CONFIG.APP_VERSION : null;
            if (_currentVer && _storedVer && _storedVer !== _currentVer) {
                _showUpdateBanner(_currentVer);
            }
            if (_currentVer) localStorage.setItem('clauger_app_version', _currentVer);

            function _showUpdateBanner(version) {
                const banner = document.getElementById('updateBanner');
                const vspan = document.getElementById('updateVersion');
                if (banner && vspan) {
                    vspan.textContent = version;
                    banner.style.display = 'block';
                    setTimeout(() => { banner.style.display = 'none'; }, 8000);
                }
            }
        });
    </script>
</body>
</html>
