<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos - Técnicos</title>
</head>
<body>
    <div class="section-card">
        <div class="section-title">📋 Datos Generales</div>
        
        <div class="form-section">
            <div class="form-section-title">🏢 Datos de Delegación</div>
            <div class="form-row">
                <div class="form-col">
                    <label class="form-label">Delegación</label>
                    <input type="text" class="form-input" data-field="delegacion">
                </div>
                <div class="form-col">
                    <label class="form-label">Dirección</label>
                    <input type="text" class="form-input" data-field="direccion">
                </div>
                <div class="form-col">
                    <label class="form-label">Población</label>
                    <input type="text" class="form-input" data-field="poblacion">
                </div>
            </div>
            <div class="form-row">
                <div class="form-col">
                    <label class="form-label">C.P.</label>
                    <input type="text" class="form-input" data-field="cp">
                </div>
                <div class="form-col">
                    <label class="form-label">Provincia</label>
                    <input type="text" class="form-input" data-field="provincia">
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="form-section-title">👤 Datos del Cliente</div>
            <div class="form-row">
                <div class="form-col">
                    <label class="form-label">Cliente</label>
                    <input type="text" class="form-input" data-field="cliente">
                </div>
                <div class="form-col">
                    <label class="form-label">Dirección</label>
                    <input type="text" class="form-input" data-field="direccion_cliente">
                </div>
                <div class="form-col">
                    <label class="form-label">CIF</label>
                    <input type="text" class="form-input" data-field="cif">
                </div>
            </div>
            <div class="form-row">
                <div class="form-col">
                    <label class="form-label">Localidad</label>
                    <input type="text" class="form-input" data-field="localidad">
                </div>
                <div class="form-col">
                    <label class="form-label">Provincia</label>
                    <input type="text" class="form-input" data-field="provincia_cliente">
                </div>
                <div class="form-col">
                    <label class="form-label">CP</label>
                    <input type="text" class="form-input" data-field="cp_cliente">
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="form-section-title">📝 Observaciones</div>
            <textarea class="form-input" data-field="observaciones" rows="6" placeholder="Escriba aquí las observaciones generales..."></textarea>
        </div>
    </div>
</body>
</html>
